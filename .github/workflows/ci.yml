name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (unsigned)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build executable
        shell: pwsh
        run: .\scripts\build-release.ps1 -Version "ci"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ClaudeUsageWidget-unsigned
          path: releases/ClaudeUsageWidget-ci.exe
          if-no-files-found: error
